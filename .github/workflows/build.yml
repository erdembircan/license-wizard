name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: pnpm verify

      - uses: EndBug/add-and-commit@v10
        with:
          message: "[BUILD]: update build output [skip ci]"
