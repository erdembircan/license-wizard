name: Build

on:
  push:
    branches: [gh-pages]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm build

      - uses: EndBug/add-and-commit@v10
        with:
          message: "[BUILD]: rebuild site [skip ci]"
